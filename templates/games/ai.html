{% extends "games/base.html" %}
{% block content %}
<section class="glass fade-up">
    <h1 style="margin-top: 0; font-weight: 800; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
        🧠 Интеллектуальный AI-анализ игры
    </h1>
    <p style="color:#94a3b8; font-size: 1.2rem; margin-bottom: 30px; font-weight: 600;">{{ game_name }}</p>

    <div class="glass" style="background: rgba(15, 23, 42, 0.4); border-left: 4px solid #a855f7; border-radius: 14px; padding: 24px;">
        <div style="line-height: 1.8; font-size: 1.05rem; color: #e2e8f0;">
            {{ analysis|linebreaksbr }}
        </div>
    </div>
</section>
{% endblock %}

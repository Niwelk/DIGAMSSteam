{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Steam Intelligence</title>

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">

</head>

<body>

<header class="header">

    <div class="container header-inner">

        <a
            href="{% url 'index' %}"
            class="logo"
        >
            STEAM INTELLIGENCE
        </a>

    </div>

</header>

<div class="container">

    <div class="layout">

        <aside class="sidebar glass">

            <div class="sidebar-title">
                Navigation
            </div>

            <nav class="sidebar-nav">

                <a
                    href="{% url 'index' %}"
                    class="sidebar-link"
                >
                    🔍 Search Games
                </a>

                {% if game %}
                <a
                    href="{% url 'game_detail' game.steam_id %}"
                    class="sidebar-link"
                >
                    🎮 Game Details
                </a>

                <a
                    href="{% url 'achievements' game.steam_id %}"
                    class="sidebar-link"
                >
                    🏆 Achievements
                </a>
                {% endif %}

            </nav>

        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Steam Achievement Intelligence</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .layout { display: flex; gap: 30px; margin-top: 40px; }
        .sidebar { width: 280px; flex-shrink: 0; }
        .main-content { flex-grow: 1; }
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
        }
        .sidebar-title { font-size: 0.85rem; uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 16px; font-weight: 700; }
        .sidebar-link {
            display: block;
            padding: 12px 16px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .sidebar-link:hover { background: rgba(99, 102, 241, 0.15); color: #fff; }
        .btn {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        .fade-up { animation: fadeUp 0.5s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="{% url 'index' %}" class="logo">STEAM INTELLIGENCE</a>
        </div>
    </header>
    <div class="container">
        <div class="layout">
            <aside class="sidebar glass">
                <div class="sidebar-title">Навигация</div>
                <nav class="sidebar-nav">
                    <a href="{% url 'index' %}" class="sidebar-link">🔍 Поиск игр</a>
                    {% if game %}
                    <a href="{% url 'game_detail' game.steam_id %}" class="sidebar-link">🎮 Информация</a>
                    <a href="{% url 'achievements' game.steam_id %}" class="sidebar-link">🏆 Достижения</a>
                    <a href="{% url 'ai_analysis' game.steam_id %}" class="sidebar-link">🧠 AI-Анализ</a>
                    {% endif %}
                </nav>
            </aside>
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>

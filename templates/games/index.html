{% extends "games/base.html" %}
{% block content %}
<section class="glass fade-up" style="text-align: center; padding: 40px;">
    <h1 style="font-size: 2.5rem; margin-top: 0; font-weight: 800;">Анализируй <span style="background: linear-gradient(90deg, #f472b6, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Steam Достижения</span></h1>
    <p style="color: #94a3b8; max-width: 600px; margin: 0 auto 30px;">Найдите любую игру Steam и изучайте редкость достижений, сложность получения и глобальную статистику игроков.</p>

    <form method="GET" action="{% url 'index' %}" style="display: flex; gap: 12px; max-width: 600px; margin: 0 auto;">
        <input type="text" name="query" value="{{ query }}" placeholder="Поиск игры (например, Witcher, Phasmophobia)..."
               style="flex-grow: 1; padding: 16px; background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; font-size: 1rem;">
        <button type="submit" class="btn">Поиск</button>
    </form>
</section>

{% if games %}
<div class="fade-up" style="margin-top: 30px;">
    {% for game in games %}
    <div class="glass" style="margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; padding: 16px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="{{ game.image }}" width="120" style="border-radius: 12px;">
            <h3 style="margin: 0; font-weight: 600;">{{ game.name }}</h3>
        </div>
        <a href="{% url 'game_detail' game.id %}" class="btn" style="padding: 10px 20px;">Открыть →</a>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endblock %}

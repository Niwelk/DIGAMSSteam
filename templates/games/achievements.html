{% extends "games/base.html" %}

{% block content %}

<section class="fade-up">

    <div style="margin-bottom: 30px;">

        <h1 class="section-title">
            {{ game.name }}
        </h1>

        <div class="section-subtitle">
            Achievement Difficulty Analysis
        </div>

    </div>

    <!-- FILTERS -->

    <div
        class="glass"
        style="
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 24px;
        "
    >

        <div
            style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                margin-bottom: 16px;
            "
        >

            <a
                href="?filter=all&sort={{ current_sort }}"
                class="card-btn"
            >
                All
            </a>

            <a
                href="?filter=rare&sort={{ current_sort }}"
                class="card-btn"
            >
                Rare
            </a>

            <a
                href="?filter=popular&sort={{ current_sort }}"
                class="card-btn"
            >
                Popular
            </a>

        </div>

        <div
            style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
            "
        >

            <a
                href="?filter={{ current_filter }}&sort=difficulty"
                class="card-btn"
            >
                Difficulty
            </a>

            <a
                href="?filter={{ current_filter }}&sort=rarity"
                class="card-btn"
            >
                Rarity
            </a>

            <a
                href="?filter={{ current_filter }}&sort=name"
                class="card-btn"
            >
                Name
            </a>

        </div>

    </div>

    <!-- ACHIEVEMENTS -->

    <div class="achievements-list">

        {% for ach in achievements %}

        <div class="achievement-card glass">

            <img
                src="{{ ach.icon }}"
                alt=""
                class="achievement-icon"
            >

            <div class="achievement-content">

                <div class="achievement-title">
                    {{ ach.name }}
                </div>

                <div class="achievement-desc">
                    {{ ach.description }}
                </div>

                <div class="difficulty-bar">

                    <div
                        class="difficulty-fill"
                        style="
                            width:
                            {{ ach.difficulty_score|floatformat:0 }}0%;
                        "
                    ></div>

                </div>

            </div>

            <div class="achievement-stats">

                <div class="difficulty-badge">

                    {{ ach.difficulty_score }}/10

                </div>

                <div class="rarity">

                    {{ ach.rarity }}% players

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
